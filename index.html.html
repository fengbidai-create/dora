<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>旅の準備 | 出國行李檢查清單</title>
    <style>
        /* --- 變數設定：日系木質調配色 --- */
        :root {
            --bg-color: #FBF9F6;       /* 柔和米白（榻榻米/和紙感） */
            --wood-dark: #6C584C;     /* 深木褐（主要文字、重色） */
            --wood-medium: #A98467;   /* 溫潤木剪影（按鈕、主視覺） */
            --wood-light: #ADC178;    /* 抹茶嫩綠（進度條、完成狀態） */
            --card-bg: #FFFFFF;       /* 純白卡片 */
            --border-color: #E6DFD3;  /* 淺米灰邊框 */
            --text-muted: #9E8E81;    /* 輔助文字 */
        }

        /* --- 基礎樣式 --- */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Noto Sans CJK TC", sans-serif;
            color: var(--wood-dark);
        }

        body {
            background-color: var(--bg-color);
            padding: 40px 20px;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 640px;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }

        header h1 {
            font-size: 1.8rem;
            font-weight: 500;
            letter-spacing: 2px;
            margin-bottom: 8px;
        }

        header p {
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        /* --- 固定置頂：進度條區塊 --- */
        .progress-container {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 12px rgba(108, 88, 76, 0.04);
            border: 1px solid var(--border-color);
            position: sticky;
            top: 20px;
            z-index: 100;
            margin-bottom: 30px;
        }

        .progress-text {
            display: flex;
            justify-content: space-between;
            font-size: 0.9rem;
            margin-bottom: 8px;
            font-weight: 500;
        }

        .progress-bar-bg {
            background: #F0EAE1;
            height: 8px;
            border-radius: 999px;
            overflow: hidden;
        }

        .progress-bar {
            background: var(--wood-light);
            height: 100%;
            width: 0%;
            transition: width 0.4s ease;
        }

        /* --- 新增分類區塊 --- */
        .add-category-box {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
        }

        input[type="text"] {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            background: var(--card-bg);
            font-size: 0.95rem;
            outline: none;
            transition: border 0.3s;
        }

        input[type="text"]:focus {
            border-color: var(--wood-medium);
        }

        button {
            background: var(--wood-medium);
            color: #FFF;
            border: none;
            padding: 12px 20px;
            border-radius: 8px;
            font-size: 0.95rem;
            cursor: pointer;
            transition: background 0.3s, opacity 0.3s;
            font-weight: 500;
        }

        button:hover {
            opacity: 0.9;
        }

        /* --- 行李分類卡片 --- */
        .category-card {
            background: var(--card-bg);
            border-radius: 12px;
            border: 1px solid var(--border-color);
            padding: 24px;
            margin-bottom: 24px;
            box-shadow: 0 4px 12px rgba(108, 88, 76, 0.02);
        }

        .category-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            border-bottom: 1px dashed var(--border-color);
            padding-bottom: 8px;
        }

        .category-title {
            font-size: 1.1rem;
            font-weight: 500;
            position: relative;
            padding-left: 12px;
        }

        /* 日系小細節：標題裝飾小木條 */
        .category-title::before {
            content: '';
            position: absolute;
            left: 0;
            top: 15%;
            height: 70%;
            width: 4px;
            background: var(--wood-medium);
            border-radius: 2px;
        }

        .btn-delete {
            background: transparent;
            color: var(--text-muted);
            padding: 4px 8px;
            font-size: 0.8rem;
        }
        .btn-delete:hover {
            color: #C97A7A;
            background: transparent;
        }

        /* --- 清單項目 (Checkbox) --- */
        .item-list {
            list-style: none;
        }

        .item-row {
            display: flex;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid #FAF8F5;
        }

        .item-row:last-child {
            border-bottom: none;
        }

        /* 客製化日系勾選方塊 */
        .todo-checkbox {
            appearance: none;
            width: 20px;
            height: 20px;
            border: 2px solid var(--border-color);
            border-radius: 4px;
            margin-right: 12px;
            cursor: pointer;
            position: relative;
            background: #FFF;
            transition: all 0.2s;
        }

        .todo-checkbox:checked {
            background: var(--wood-light);
            border-color: var(--wood-light);
        }

        .todo-checkbox:checked::after {
            content: '✓';
            position: absolute;
            color: white;
            font-size: 14px;
            font-weight: bold;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        .item-text {
            font-size: 0.95rem;
            cursor: pointer;
            flex: 1;
            transition: color 0.3s;
        }

        .todo-checkbox:checked + .item-text {
            color: var(--text-muted);
            text-decoration: line-through;
        }

        /* 卡片內的新增項目輸入框 */
        .add-item-box {
            display: flex;
            gap: 8px;
            margin-top: 16px;
        }

        .add-item-box input {
            padding: 8px 12px;
            font-size: 0.85rem;
        }

        .add-item-box button {
            padding: 8px 16px;
            font-size: 0.85rem;
            background: #8E7D71;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>旅の支度</h1>
        <p>優雅、從容地整理你的行李</p>
    </header>

    <!-- 進度條區塊 -->
    <div class="progress-container">
        <div class="progress-text">
            <span>打包進度</span>
            <span id="progress-percent">0% (0/0)</span>
        </div>
        <div class="progress-bar-bg">
            <div class="progress-bar" id="progress-bar"></div>
        </div>
    </div>

    <!-- 新增分類大框 -->
    <div class="add-category-box">
        <input type="text" id="new-category-input" placeholder="輸入新分類，例如：衣物、證件...">
        <button onclick="addCategory()">新增分類</button>
    </div>

    <!-- 分類清單容器 -->
    <div id="category-container"></div>
</div>

<script>
    // 預設的初始資料結構
    let checklistData = [
        {
            id: 1,
            title: "隨身證件",
            items: [
                { id: 101, text: "護照與簽證", checked: false },
                { id: 102, text: "電子機票、住宿憑證", checked: false }
            ]
        },
        {
            id: 2,
            title: "衣物服飾",
            items: [
                { id: 201, text: "換洗衣物", checked: false },
                { id: 202, text: "舒適走路鞋", checked: false }
            ]
        }
    ];

    // 初始化渲染
    renderChecklist();

    // 渲染整頁的主函數
    function renderChecklist() {
        const container = document.getElementById('category-container');
        container.innerHTML = '';

        checklistData.forEach(category => {
            const card = document.createElement('div');
            card.className = 'category-card';
            card.innerHTML = `
                <div class="category-header">
                    <span class="category-title">${category.title}</span>
                    <button class="btn-delete" onclick="deleteCategory(${category.id})">刪除分類</button>
                </div>
                <ul class="item-list">
                    ${category.items.map(item => `
                        <li class="item-row">
                            <input type="checkbox" class="todo-checkbox" id="item-${item.id}" 
                                   ${item.checked ? 'checked' : ''} onchange="toggleItem(${category.id}, ${item.id})">
                            <label class="item-text" for="item-${item.id}">${item.text}</label>
                            <button class="btn-delete" style="padding:2px 6px;" onclick="deleteItem(${category.id}, ${item.id})">✕</button>
                        </li>
                    `).join('')}
                </ul>
                <div class="add-item-box">
                    <input type="text" id="input-cat-${category.id}" placeholder="新增物品...">
                    <button onclick="addItem(${category.id})">添加</button>
                </div>
            `;
            container.appendChild(card);
        });

        updateProgress();
    }

    // 更新進度條
    function updateProgress() {
        let totalItems = 0;
        let checkedItems = 0;

        checklistData.forEach(cat => {
            cat.items.forEach(item => {
                totalItems++;
                if (item.checked) checkedItems++;
            });
        });

        const percent = totalItems === 0 ? 0 : Math.round((checkedItems / totalItems) * 100);
        
        document.getElementById('progress-bar').style.width = `${percent}%`;
        document.getElementById('progress-percent').innerText = `${percent}% (${checkedItems}/${totalItems})`;
    }

    // 新增分類
    function addCategory() {
        const input = document.getElementById('new-category-input');
        const title = input.value.trim();
        if (!title) return;

        checklistData.push({
            id: Date.now(),
            title: title,
            items: []
        });

        input.value = '';
        renderChecklist();
    }

    // 刪除分類
    function deleteCategory(catId) {
        checklistData = checklistData.filter(cat => cat.id !== catId);
        renderChecklist();
    }

    // 新增物品項目
    function addItem(catId) {
        const input = document.getElementById(`input-cat-${catId}`);
        const text = input.value.trim();
        if (!text) return;

        const category = checklistData.find(cat => cat.id === catId);
        if (category) {
            category.items.push({
                id: Date.now(),
                text: text,
                checked: false
            });
        }

        input.value = '';
        renderChecklist();
    }

    // 刪除物品項目
    function deleteItem(catId, itemId) {
        const category = checklistData.find(cat => cat.id === catId);
        if (category) {
            category.items = category.items.filter(item => item.id !== itemId);
        }
        renderChecklist();
    }

    // 切換打勾狀態
    function toggleItem(catId, itemId) {
        const category = checklistData.find(cat => cat.id === catId);
        if (category) {
            const item = category.items.find(i => i.id === itemId);
            if (item) {
                item.checked = !item.checked;
            }
        }
        updateProgress(); // 僅更新進度條，不重新渲染整頁，保持動畫流暢
    }
</script>

</body>
</html>
